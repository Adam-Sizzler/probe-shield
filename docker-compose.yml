x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: always
  networks:
    - probe-shield-network

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  probe-shield:
    <<: [*common, *logging, *env]
    image: ghcr.io/adam-sizzler/probe-shield:latest 
    container_name: probe-shield
    restart: unless-stopped
    ports:
      - "${PROBE_SHIELD_HTTP_PORT:-4000}:${PROBE_SHIELD_HTTP_PORT:-4000}"

networks:
  exodus-network:
    name: probe-shield-network
    driver: bridge
    external: false

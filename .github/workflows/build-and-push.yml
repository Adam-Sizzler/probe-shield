name: Build And Push ProbeShield Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for Docker image, for example v1.2.3"
        required: true
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GITHUB_REPOSITORY_OWNER может содержать заглавные буквы,
      # а GHCR требует lowercase-имя образа — иначе push упадёт.
      - name: Resolve lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          no-cache: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/probe-shield:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/probe-shield:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=probe-shield
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}